name: CI & Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # monthly rebuild+redeploy: rolls the estimated-years window forward and picks up
    # engine releases, keeping the published feed fresh without any bot commits
    - cron: '23 2 1 * *'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: docs

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
